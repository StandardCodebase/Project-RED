networks:
  clearnet-tier:
    driver: bridge

services:
  red_light_node:
    build: .
    container_name: red_light_node
    restart: unless-stopped
    networks:
      - clearnet-tier
    environment:
      - RED_NODE_NAME=Clearnet-Gateway-01
      - RED_PORT=8080
      - RED_DATA_DIR=/app/data/clearnet
    volumes:
      - ./data/clearnet:/app/data/clearnet:rw

  caddy_proxy:
    image: caddy:latest
    container_name: caddy_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - clearnet-tier
    volumes:
      - ./caddy_routing:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - red_light_node
    command: >
      /bin/sh -c '
      if [ ! -f /etc/caddy/Caddyfile ]; then
        echo "Generating default Caddyfile..."
        echo ":80 {" > /etc/caddy/Caddyfile
        echo "    reverse_proxy red_light_node:8080" >> /etc/caddy/Caddyfile
        echo "}" >> /etc/caddy/Caddyfile
      fi;
      caddy run --config /etc/caddy/Caddyfile --adapter caddyfile'

volumes:
  caddy_data:
  caddy_config:
