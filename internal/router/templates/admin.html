<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>RED Engine Admin</title>
        <style>
            body {
                font-family: system-ui, sans-serif;
                background: #1a1a1a;
                color: #fff;
                display: flex;
                justify-content: center;
                padding-top: 5vh;
                padding-bottom: 5vh;
                margin: 0;
            }
            .card {
                background: #2a2a2a;
                padding: 2rem;
                border-radius: 8px;
                width: 100%;
                max-width: 500px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            }
            h1,
            h2 {
                margin-top: 0;
                color: #ff4757;
            }
            h2 {
                font-size: 1.2rem;
                margin-top: 2rem;
                border-bottom: 1px solid #444;
                padding-bottom: 0.5rem;
            }
            label {
                display: block;
                margin: 1rem 0 0.5rem;
                font-size: 0.9rem;
                color: #aaa;
            }

            /* Password Input Wrapper */
            .input-group {
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }
            input[type="text"],
            input[type="password"] {
                flex-grow: 1;
                padding: 0.75rem;
                border: 1px solid #444;
                border-radius: 4px;
                background: #111;
                color: white;
                box-sizing: border-box;
            }
            .toggle-btn {
                background: #444;
                color: white;
                border: none;
                padding: 0.75rem 1rem;
                border-radius: 4px;
                cursor: pointer;
            }
            .toggle-btn:hover {
                background: #555;
            }

            .checkbox-group {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                margin-top: 1rem;
            }
            button.primary {
                margin-top: 1.5rem;
                width: 100%;
                padding: 0.75rem;
                background: #ff4757;
                color: white;
                border: none;
                border-radius: 4px;
                font-weight: bold;
                cursor: pointer;
                transition: background 0.2s;
            }
            button.primary:hover {
                background: #ff6b81;
            }

            #status,
            #login-status {
                margin-top: 1rem;
                font-size: 0.9rem;
                text-align: center;
            }
            .success {
                color: #2ed573;
            }
            .error {
                color: #ff4757;
            }

            /* Listing elements */
            ul {
                list-style: none;
                padding: 0;
                margin: 0;
            }
            li {
                background: #111;
                border: 1px solid #444;
                padding: 1rem;
                margin-bottom: 0.5rem;
                border-radius: 4px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                word-break: break-all;
                gap: 1rem;
            }
            .sync-info {
                display: flex;
                flex-direction: column;
                font-size: 0.85rem;
                color: #aaa;
            }
            .sync-info strong {
                color: #fff;
                font-size: 1rem;
                margin-bottom: 0.2rem;
            }
            .btn-delete {
                background: #ff4757;
                color: white;
                border: none;
                padding: 0.4rem 0.8rem;
                border-radius: 4px;
                cursor: pointer;
                font-size: 0.8rem;
                min-width: 70px;
            }
            .btn-delete:hover {
                background: #ff6b81;
            }

            /* View Gating */
            #dashboard-view {
                display: none;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>Node Administration</h1>

            <div id="login-view">
                <label>Admin Token</label>
                <div class="input-group">
                    <input
                        type="password"
                        id="token"
                        placeholder="Enter secure token"
                        required
                    />
                    <button
                        type="button"
                        class="toggle-btn"
                        id="togglePasswordBtn"
                        onclick="toggleVisibility()"
                    >
                        Show
                    </button>
                </div>
                <button class="primary" onclick="login()">
                    Access Dashboard
                </button>
                <div id="login-status"></div>
            </div>

            <div id="dashboard-view">
                <p
                    style="
                        color: #2ed573;
                        font-weight: bold;
                        text-align: center;
                    "
                >
                    ✓ Authenticated
                </p>

                <h2>Add Remote Base or Guide</h2>
                <label>Remote File or Archive URL</label>
                <input
                    type="text"
                    id="url"
                    placeholder="https://example.com/kb.tar.gz or raw file URL"
                    required
                />

                <label>Target Directory Name (Inside Data Root)</label>
                <input
                    type="text"
                    id="filename"
                    placeholder="e.g., devops, programming/go"
                    required
                />

                <div class="checkbox-group">
                    <input type="checkbox" id="saveState" checked />
                    <label style="margin: 0"
                        >Save to config.json (Startup Sync)</label
                    >
                </div>

                <button class="primary" onclick="syncGuide()">
                    Import & Sync
                </button>
                <div id="status"></div>

                <h2>Currently Synced Sync Targets</h2>
                <ul id="sync-list"></ul>
            </div>
        </div>
    </body>
</html>
